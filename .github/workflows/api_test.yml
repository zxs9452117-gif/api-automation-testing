name: API Automation Testing

# 設定觸發條件：當 push 到 main 分支或發送 Pull Request 時觸發
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行 API 測試
      # 這裡執行 pytest，並加上 -v (詳細) 與 -s (顯示 print)
      run: |
        pytest tests/ -v -s --junitxml=reports/result.xml

    - name: 上傳測試結果報告
      if: always() # 無論測試成功或失敗都會執行這一步
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: reports/result.xml